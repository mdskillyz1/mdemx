    <text x="4" y="150" fill="#a9b8af" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="34" font-weight="500" letter-spacing="1.5">London digital studio</text>
