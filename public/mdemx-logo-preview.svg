<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">MDemx logo preview</title>
  <desc id="desc">MDemx mint green logo mark and wordmark on a dark charcoal background.</desc>
  <defs>
    <radialGradient id="mintGlow" cx="32%" cy="24%" r="62%">
      <stop offset="0%" stop-color="#a7f3c2" stop-opacity="0.34"/>
      <stop offset="46%" stop-color="#4ade80" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#08110d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="markBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102018"/>
      <stop offset="100%" stop-color="#07110c"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#a7f3c2" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#08110d"/>
  <rect width="1600" height="900" fill="url(#mintGlow)"/>
  <circle cx="1310" cy="170" r="250" fill="#a7f3c2" opacity="0.045"/>
  <circle cx="220" cy="760" r="270" fill="#4ade80" opacity="0.055"/>

  <g transform="translate(268 290)" filter="url(#softShadow)">
