    <circle cx="73" cy="58" r="64" fill="#a7f3c2" opacity="0.22"/>
    <path d="M44 162V69h29.3l41.9 54.4L157.4 69H187v93h-29.3v-46.9l-31.8 39.7h-21.5l-31.5-39.7V162H44Z" fill="#a7f3c2"/>
